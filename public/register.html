<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Daily Positivity</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-50/60 min-h-screen flex items-center justify-center p-4 font-sans">

  <div class="max-w-md w-full bg-white rounded-2xl shadow-sm border border-amber-100 p-6 md:p-8">
    
    <div class="text-center mb-5">
      <div class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-amber-100 text-amber-600 text-xl mb-2">
        🌟
      </div>
      <h1 class="text-xl font-bold text-slate-800">Create an Account</h1>
      <p class="text-xs text-slate-500 mt-0.5">Custom quotes delivered straight to your inbox daily.</p>
    </div>

  <button type="button" id="signUpBtn" class="w-full flex items-center justify-center gap-3 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 font-medium py-2.5 px-4 rounded-xl shadow-sm transition duration-200 active:scale-[0.99] text-sm">
  <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo" class="w-4 h-4" />
  <span>Sign up with Google</span>
</button>

    <div class="flex items-center my-4">
      <div class="flex-grow border-t border-slate-100"></div>
      <span class="px-3 text-[10px] text-slate-400 uppercase tracking-wider bg-white">or</span>
      <div class="flex-grow border-t border-slate-100"></div>
    </div>

    <form onsubmit="event.preventDefault();" class="space-y-3.5">
      <div>
        <label for="name" class="block text-[10px] font-semibold text-slate-600 uppercase tracking-wider mb-1">Full Name</label>
        <input type="text" id="name" placeholder="John Doe" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm text-slate-800 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:bg-white transition" required>
      </div>

      <div>
        <label for="email" class="block text-[10px] font-semibold text-slate-600 uppercase tracking-wider mb-1">Email Address</label>
        <input type="email" id="email" placeholder="name@example.com" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm text-slate-800 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:bg-white transition" required>
      </div>

      <div>
        <label for="password" class="block text-[10px] font-semibold text-slate-600 uppercase tracking-wider mb-1">Password</label>
        <input type="password" id="password" placeholder="••••••••" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm text-slate-800 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:bg-white transition" required>
      </div>

      <div class="flex items-start pt-0.5">
        <input type="checkbox" id="terms" class="w-3.5 h-3.5 mt-0.5 rounded text-amber-500 border-slate-300 focus:ring-amber-400 accent-amber-500" required>
        <label for="terms" class="ms-2 text-xs text-slate-600 select-none leading-tight">
          I agree to the <a href="#" class="text-amber-600 hover:underline">Terms</a> & <a href="#" class="text-amber-600 hover:underline">Privacy</a>.
        </label>
      </div>

      <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-semibold py-2.5 px-4 rounded-xl shadow-sm text-sm transition-all duration-200 active:scale-[0.98] mt-1">
        Get Started
      </button>
    </form>

    <div class="text-center mt-5">
      <p class="text-xs text-slate-500">
        Already have an account? 
        <a href="./index.html" class="font-medium text-amber-600 hover:text-amber-700 transition">Sign in</a>
      </p>
    </div>

  </div>
<script type="module" src="register.js"></script>
</body>
</html>
